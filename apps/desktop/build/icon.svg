<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0a0d12" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- squircle plate — flat brand charcoal (gradients band visibly this dark) -->
  <rect x="100" y="100" width="824" height="824" rx="190" fill="#181d27" filter="url(#shadow)"/>
  <!-- hairline top light for a little dimension -->
  <rect x="100" y="100" width="824" height="824" rx="190" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="4"/>

  <!-- six stems, one bar each: vocals, drums, bass, guitar, piano, other -->
  <g>
    <rect x="230" y="372" width="64" height="280" rx="32" fill="#e8446d"/>
    <rect x="330" y="312" width="64" height="400" rx="32" fill="#e08a00"/>
    <rect x="430" y="252" width="64" height="520" rx="32" fill="#7c5cff"/>
    <rect x="530" y="292" width="64" height="440" rx="32" fill="#0da678"/>
    <rect x="630" y="352" width="64" height="320" rx="32" fill="#0d9bdc"/>
    <rect x="730" y="407" width="64" height="210" rx="32" fill="#8a919c"/>
  </g>
</svg>
